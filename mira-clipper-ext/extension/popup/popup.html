<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand-lockup">
        <img class="brand-mark" src="../icons/icon-128.png" alt="" />
        <div class="brand-copy">
          <div class="brand-title">触界</div>
          <div class="brand-subtitle">操作网页，收藏内容</div>
        </div>
      </div>
      <span id="connectionBadge" class="connection-badge disconnected">待授权</span>
    </header>

    <section id="authGate" class="auth-gate">
      <div class="auth-copy">
        <h1>连接 Mira</h1>
        <p class="auth-hint">粘贴 Mira 中生成的一次性授权码。</p>
      </div>
      <label for="authorizationCode">Mira 授权码</label>
      <textarea id="authorizationCode" rows="4" placeholder="从 Mira 设置生成后粘贴" autocomplete="off"></textarea>
      <button id="exchangeCodeBtn" type="button" class="auth-primary-button">授权并连接</button>
      <div id="authStatus" class="status"></div>
    </section>

    <main id="workspaceView" class="workspace-view hidden">
      <div class="panel-tabs" role="tablist" aria-label="触界能力">
        <button id="jianxingTab" type="button" role="tab" aria-controls="jianxingView" aria-selected="false" data-panel="jianxing">见行</button>
        <button id="clipTab" type="button" role="tab" aria-controls="captureView" aria-selected="true" data-panel="clip">剪藏</button>
      </div>

      <section id="jianxingView" class="panel-view hidden" role="tabpanel" aria-labelledby="jianxingTab">
        <div class="section-heading">
          <div>
            <div class="section-kicker">当前页面</div>
            <h2 id="currentPageTitle">等待页面</h2>
          </div>
          <span id="operationState" class="operation-state idle">空闲</span>
        </div>
        <div id="currentPageUrl" class="current-page-url"></div>
        <div class="status-rows">
          <div class="status-row">
            <span>连接方式</span>
            <strong>Native Messaging</strong>
          </div>
          <div class="status-row">
            <span>连接状态</span>
            <strong id="bridgeState">等待连接</strong>
          </div>
        </div>
        <div id="operationDetail" class="operation-detail">暂无浏览器操作</div>
      </section>

      <section id="captureView" class="capture-view" role="tabpanel" aria-labelledby="clipTab">
        <div class="header">
          <div class="attachment-chip">
            <img id="favicon" src="" alt="" hidden />
          </div>
          <div class="meta">
            <input id="title" type="text" placeholder="页面标题" autocomplete="off" />
            <div id="url" class="url"></div>
          </div>
          <span class="transport-control">Native</span>
        </div>

        <div id="ruleStatus" class="rule-status hidden"></div>

        <div id="selectedTextBox" class="field preview-field hidden">
          <label id="previewLabel" for="selectedText">提取正文预览</label>
          <textarea id="selectedText" rows="3" placeholder="未选中文字"></textarea>
          <div id="imagePreview" class="image-preview-list hidden" aria-label="采集的图片"></div>
        </div>

        <details class="field manual-details">
          <summary>人工标签和备注</summary>
          <div class="manual-body">
            <div class="field compact-field">
              <label>标签</label>
              <div id="tagList" class="tag-list"></div>
              <input id="tagInput" type="text" placeholder="输入标签后回车…" autocomplete="off" />
            </div>

            <div class="field compact-field">
              <label>备注</label>
              <textarea id="note" rows="2" placeholder=""></textarea>
            </div>
          </div>
        </details>

        <label class="rebuild-option" for="processAi">
          <input id="processAi" type="checkbox" />
          <span>生成 AI 摘要、标签和实体</span>
        </label>

        <label class="rebuild-option" for="rebuildKnowledge">
          <input id="rebuildKnowledge" type="checkbox" />
          <span>重建关联与洞见</span>
        </label>

        <div class="actions">
          <button id="saveBtn" type="button" disabled>
            <span class="spinner hidden"></span>
            <span class="label">保存到 Mira</span>
          </button>
          <div id="status" class="status"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="../lib/authorization-code.js"></script>
  <script src="popup.js"></script>
</body>
</html>
