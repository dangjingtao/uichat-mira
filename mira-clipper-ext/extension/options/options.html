<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <h1>见行设置</h1>

    <div class="field">
      <label>连接方式</label>
      <p class="hint">见行使用 Native Messaging 连接 Mira。请先在 Mira 中安装或修复连接组件。</p>
    </div>

    <div class="field">
      <label for="backendUrl">Mira 后端地址</label>
      <input id="backendUrl" type="text" placeholder="授权后自动识别，可留空" />
      <p class="hint">授权页会从授权码自动写入地址。这里仅用于连接诊断或手动覆盖。</p>
    </div>

    <div class="field">
      <label>登录授权</label>
      <button id="openAuthorizationPage" type="button" class="primary">打开授权页</button>
      <p class="hint">授权码输入和登录只在独立授权页完成。</p>
    </div>

    <div class="field">
      <label>连接测试</label>
      <button id="testBtn" type="button">测试连接</button>
      <span id="testResult" class="test-result"></span>
    </div>

    <div class="field actions">
      <button id="saveBtn" type="button" class="primary">保存设置</button>
      <span id="saveResult" class="save-result"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
