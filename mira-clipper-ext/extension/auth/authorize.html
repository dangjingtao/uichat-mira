<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>见行授权</title>
  <link rel="stylesheet" href="authorize.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel" aria-labelledby="pageTitle">
      <div class="brand-mark">M</div>
      <h1 id="pageTitle">连接见行</h1>
      <p class="intro">粘贴 Mira 中生成的一次性授权码，连接当前 Chrome 浏览器。</p>

      <label for="authorizationCode">Mira 授权码</label>
      <textarea id="authorizationCode" rows="4" placeholder="从 Mira 设置生成后粘贴" autocomplete="off"></textarea>
      <button id="exchangeCodeBtn" type="button" class="primary">授权并连接</button>

      <p class="hint">授权码由 Mira 生成，包含本机后端地址和一次性登录凭证，不需要手动填写端口。</p>
      <div id="authStatus" class="status" role="status" aria-live="polite"></div>

      <div class="connection-row">
        <label for="transport">连接方式</label>
        <select id="transport">
          <option value="native">Native Messaging（主连接）</option>
          <option value="websocket">WebSocket（开发调试）</option>
        </select>
      </div>
    </section>
  </main>
  <script src="../lib/authorization-code.js"></script>
  <script src="authorize.js"></script>
</body>
</html>
