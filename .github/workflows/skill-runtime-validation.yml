name: Skill Runtime Validation

on:
  push:
    branches:
      - codex/skill-runtime-v1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck server
        run: pnpm --dir server typecheck

      - name: Run Skill Runtime tests
        run: pnpm --dir server exec vitest run src/skill
