name: Refresh Pi Skill lockfile

on:
  push:
    branches: [dev]
    paths:
      - '.github/workflows/refresh-pi-skill-lock.yml'

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies and regenerate lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck server
        run: pnpm --filter @ui-chat-mira/server typecheck

      - name: Commit generated lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml already matches package manifests"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore(deps): refresh lockfile for Pi Skill Agent"
          git push origin HEAD:dev
