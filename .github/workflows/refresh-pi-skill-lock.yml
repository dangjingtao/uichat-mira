name: Validate Pi Skill pilot

on:
  pull_request:
    branches: [dev]
    paths:
      - '.github/pi-skill-validation-trigger'
      - 'package.json'
      - 'server/package.json'
      - 'server/src/agent/**'
      - 'server/src/skills/agent/**'
      - 'server/scripts/smoke-pi-skill-agent.ts'

permissions:
  contents: write

jobs:
  validate-pi-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies and regenerate lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck server
        run: pnpm --filter @ui-chat-mira/server typecheck

      - name: Run focused forked Skill tests
        run: pnpm --dir server exec vitest run src/agent/nodes/next-action-planner.forked-skill.test.ts src/agent/nodes/prepare-context-with-forked-skill.test.ts

      - name: Commit generated lockfile to validation branch
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml already matches package manifests"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore(deps): refresh lockfile for Pi Skill Agent"
          git push origin HEAD:${{ github.head_ref }}
