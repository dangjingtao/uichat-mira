name: Refresh Office lock and verify

on:
  push:
    branches:
      - dev
    paths:
      - .github/workflows/refresh-office-lock.yml

permissions:
  contents: write

jobs:
  refresh-lock-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install and refresh lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck server
        run: pnpm --filter @ui-chat-mira/server typecheck

      - name: Typecheck desktop
        run: pnpm --filter @ui-chat-mira/desktop typecheck

      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml already clean"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "[skip ci] chore(deps): sync Office lockfile"
          git push origin HEAD:dev
