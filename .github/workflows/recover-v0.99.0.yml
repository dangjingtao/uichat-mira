name: Recover v0.99.0 Release

on:
  push:
    branches: ['release/recover-v0.99.0']

permissions:
  contents: write
  actions: read

jobs:
  recover-release:
    name: Recover v0.99.0 Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repair v0.99.0 tag
        env:
          TARGET_SHA: 1e30d43d212b0efcdf25fbb7dabbff70f43c8620
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$TARGET_SHA"
          git tag -f v0.99.0 "$TARGET_SHA"
          git push origin refs/tags/v0.99.0 --force
          echo "v0.99.0 -> $TARGET_SHA"

      - name: Download existing 0.99.0 build artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: 29892786311
          path: release-assets
          merge-multiple: false

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p dist
          for dir in release-assets/*/; do
            prefix=$(basename "$dir")
            find "$dir" -type f | while read -r file; do
              relative_path="${file#"$dir"}"
              safe_name=$(printf '%s' "$relative_path" | tr '/' '_')
              cp "$file" "dist/${prefix}_${safe_name}"
            done
          done
          ls -lah dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view v0.99.0 >/dev/null 2>&1; then
            gh release upload v0.99.0 dist/* --clobber
          else
            gh release create v0.99.0 dist/* \
              --verify-tag \
              --title "v0.99.0" \
              --generate-notes
          fi

      - name: Upload release assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_RETRY_MODE: standard
          AWS_MAX_ATTEMPTS: 5
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        shell: bash
        run: |
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          latest_prefix="mira/latest"
          legacy_previous_prefix="mira/previous"

          aws s3 rm "s3://${R2_BUCKET}/${legacy_previous_prefix}/" \
            --recursive \
            --endpoint-url "$endpoint" \
            --only-show-errors || true

          aws s3 sync dist/ "s3://${R2_BUCKET}/${latest_prefix}/" \
            --delete \
            --endpoint-url "$endpoint" \
            --only-show-errors

          public_base="${R2_PUBLIC_BASE_URL%/}"
          {
            echo "### Cloudflare R2"
            echo "Uploaded v0.99.0 release assets to: ${public_base}/${latest_prefix}/"
            echo "Retention: latest release only"
          } >> "$GITHUB_STEP_SUMMARY"
