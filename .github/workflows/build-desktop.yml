name: Build Desktop Apps

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  pi-skill-final-validation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact validation source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate Pi Skill pilot and attempt live smoke entrypoints
        shell: bash
        run: |
          set +e
          pnpm install --frozen-lockfile > /tmp/install.txt 2>&1
          install_status=$?

          typecheck_status=99
          tests_status=99
          docx_smoke_status=99
          pdf_smoke_status=99
          pptx_smoke_status=99
          xlsx_smoke_status=99

          if [ "$install_status" -eq 0 ]; then
            pnpm --filter @ui-chat-mira/server typecheck > /tmp/typecheck.txt 2>&1
            typecheck_status=$?

            pnpm --dir server exec vitest run \
              src/agent/nodes/next-action-planner.forked-skill.test.ts \
              src/agent/nodes/prepare-context-with-forked-skill.test.ts \
              src/agent/nodes/forked-skill-agent.approval.test.ts \
              src/agent/pi-loop/forked-skill-finalization.test.ts \
              src/skills/agent/tool-adapters.approval.test.ts \
              > /tmp/tests.txt 2>&1
            tests_status=$?

            mkdir -p /tmp/pi-smoke-docx /tmp/pi-smoke-pdf /tmp/pi-smoke-pptx /tmp/pi-smoke-xlsx
            pnpm --dir server exec node -e "const ExcelJS=require('exceljs'); const w=new ExcelJS.Workbook(); const s=w.addWorksheet('Smoke'); s.addRow(['A','B']); s.addRow([1,2]); w.xlsx.writeFile('/tmp/pi-smoke-xlsx/input.xlsx');" > /tmp/xlsx-fixture.txt 2>&1

            timeout 45s pnpm smoke:pi-skill-agent -- --skill docx --workspace /tmp/pi-smoke-docx > /tmp/docx-smoke.txt 2>&1
            docx_smoke_status=$?
            timeout 45s pnpm smoke:pi-skill-agent -- --skill pdf --workspace /tmp/pi-smoke-pdf > /tmp/pdf-smoke.txt 2>&1
            pdf_smoke_status=$?
            timeout 45s pnpm smoke:pi-skill-agent -- --skill pptx --workspace /tmp/pi-smoke-pptx > /tmp/pptx-smoke.txt 2>&1
            pptx_smoke_status=$?
            timeout 45s pnpm smoke:pi-skill-agent -- --skill xlsx --workspace /tmp/pi-smoke-xlsx --input input.xlsx > /tmp/xlsx-smoke.txt 2>&1
            xlsx_smoke_status=$?
          else
            echo "typecheck skipped because frozen install failed" > /tmp/typecheck.txt
            echo "focused tests skipped because frozen install failed" > /tmp/tests.txt
            echo "smoke skipped because frozen install failed" > /tmp/docx-smoke.txt
            cp /tmp/docx-smoke.txt /tmp/pdf-smoke.txt
            cp /tmp/docx-smoke.txt /tmp/pptx-smoke.txt
            cp /tmp/docx-smoke.txt /tmp/xlsx-smoke.txt
          fi

          {
            echo "Pi Skill Agent final validation"
            echo "source_commit=$GITHUB_SHA"
            echo "install_status=$install_status"
            echo "typecheck_status=$typecheck_status"
            echo "tests_status=$tests_status"
            echo "docx_smoke_status=$docx_smoke_status"
            echo "pdf_smoke_status=$pdf_smoke_status"
            echo "pptx_smoke_status=$pptx_smoke_status"
            echo "xlsx_smoke_status=$xlsx_smoke_status"
            echo
            echo "===== frozen install tail ====="
            tail -n 80 /tmp/install.txt
            echo
            echo "===== typecheck tail ====="
            tail -n 180 /tmp/typecheck.txt
            echo
            echo "===== focused tests tail ====="
            tail -n 240 /tmp/tests.txt
            echo
            echo "===== DOCX smoke tail ====="
            tail -n 160 /tmp/docx-smoke.txt
            echo
            echo "===== PDF smoke tail ====="
            tail -n 160 /tmp/pdf-smoke.txt
            echo
            echo "===== PPTX smoke tail ====="
            tail -n 160 /tmp/pptx-smoke.txt
            echo
            echo "===== XLSX smoke tail ====="
            tail -n 160 /tmp/xlsx-smoke.txt
          } > /tmp/pi-skill-agent-validation-final.txt

          git fetch origin dev
          git checkout -B dev origin/dev
          cp /tmp/pi-skill-agent-validation-final.txt docs/skill/pi-skill-agent-validation-final.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/skill/pi-skill-agent-validation-final.txt
          git commit -m "chore(ci): record final Pi Skill validation result"
          git push origin HEAD:dev

          if [ "$install_status" -ne 0 ] || [ "$typecheck_status" -ne 0 ] || [ "$tests_status" -ne 0 ]; then
            exit 1
          fi
