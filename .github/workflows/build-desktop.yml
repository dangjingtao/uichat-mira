name: Build Desktop Apps

on:
  push:
    branches: [main, master, dev]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-electron:
    name: Build Electron (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: win
          # 如需 macOS 产物，先补齐 server/build.js 中的平台原生依赖拷贝逻辑，
          # 再启用下面两行并确认签名证书配置。
          # - os: macos-latest
          #   platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Cache Electron builder
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron-builder/Cache
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Cache local model packs
        uses: actions/cache@v4
        with:
          path: .local-models/raw
          key: ${{ runner.os }}-local-model-packs-v1-${{ hashFiles('scripts/prepare-local-model-packs.mjs') }}
          restore-keys: |
            ${{ runner.os }}-local-model-packs-v1-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package versions
        run: pnpm version:sync

      - name: Install clipper extension dependencies
        run: npm ci --prefix mira-clipper-ext --ignore-scripts

      - name: Configure clipper extension signing key
        env:
          MIRA_CLIPPER_CRX_PROD_PEM: ${{ secrets.MIRA_CLIPPER_CRX_PROD_PEM }}
        run: |
          New-Item -ItemType Directory -Force mira-clipper-ext/.keys | Out-Null
          [System.IO.File]::WriteAllText(
            (Join-Path (Resolve-Path mira-clipper-ext/.keys) 'mira-clipper-prod.pem'),
            $env:MIRA_CLIPPER_CRX_PROD_PEM,
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Type check
        run: pnpm check

      - name: Prepare local model packs
        run: pnpm prepare:local-model-packs
        env:
          LOCAL_MODEL_RAW_ROOT: .local-models/raw
          LOCAL_MODEL_ALLOW_NETWORK: '1'
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build Electron (${{ matrix.platform }})
        run: node scripts/build-dist.js ${{ matrix.platform }}
        env:
          RELEASE_KEEP_COUNT: 3

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: |
            release/**/electron/*Setup*.exe
            release/**/electron/*Setup*.exe.blockmap
          if-no-files-found: error
          retention-days: 3

  build-tauri:
    name: Build Tauri (Windows)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust / Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri
          cache-targets: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package versions
        run: pnpm version:sync

      - name: Install clipper extension dependencies
        run: npm ci --prefix mira-clipper-ext --ignore-scripts

      - name: Configure clipper extension signing key
        env:
          MIRA_CLIPPER_CRX_PROD_PEM: ${{ secrets.MIRA_CLIPPER_CRX_PROD_PEM }}
        run: |
          New-Item -ItemType Directory -Force mira-clipper-ext/.keys | Out-Null
          [System.IO.File]::WriteAllText(
            (Join-Path (Resolve-Path mira-clipper-ext/.keys) 'mira-clipper-prod.pem'),
            $env:MIRA_CLIPPER_CRX_PROD_PEM,
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Cache local model packs
        uses: actions/cache@v4
        with:
          path: .local-models/raw
          key: ${{ runner.os }}-local-model-packs-v1-${{ hashFiles('scripts/prepare-local-model-packs.mjs') }}
          restore-keys: |
            ${{ runner.os }}-local-model-packs-v1-

      - name: Type check
        run: pnpm check

      - name: Prepare local model packs
        run: pnpm prepare:local-model-packs
        env:
          LOCAL_MODEL_RAW_ROOT: .local-models/raw
          LOCAL_MODEL_ALLOW_NETWORK: '1'
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build Tauri (Windows)
        run: pnpm package:tauri:win
        env:
          CARGO_BUILD_JOBS: 1
          CARGO_INCREMENTAL: '0'
          RELEASE_KEEP_COUNT: 3

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            release/**/tauri/msi/*.msi
            release/**/tauri/nsis/*setup.exe
          if-no-files-found: error
          retention-days: 3

  release:
    name: Create GitHub Release
    needs: [build-electron, build-tauri]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Flatten release assets
        run: |
          mkdir -p dist
          for dir in release-assets/*/; do
            prefix=$(basename "$dir")
            find "$dir" -type f | while read -r file; do
              relative_path="${file#"$dir"}"
              safe_name=$(printf '%s' "$relative_path" | tr '/' '_')
              cp "$file" "dist/${prefix}_${safe_name}"
            done
          done
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Upload release assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_RETRY_MODE: standard
          AWS_MAX_ATTEMPTS: 5
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          latest_prefix="mira/latest"
          legacy_previous_prefix="mira/previous"

          # R2 仅保留 latest。清掉旧 previous，避免长期占空间。
          aws s3 rm "s3://${R2_BUCKET}/${legacy_previous_prefix}/" \
            --recursive \
            --endpoint-url "$endpoint" \
            --only-show-errors || true

          # 只从本地 dist 同步到 latest，避免 R2 -> R2 复制触发
          # Cloudflare R2 未实现的 GetObjectTagging API。
          for attempt in 1 2 3; do
            if aws s3 sync dist/ "s3://${R2_BUCKET}/${latest_prefix}/" \
              --delete \
              --endpoint-url "$endpoint" \
              --only-show-errors; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "R2 upload failed after ${attempt} attempts." >&2
              exit 1
            fi

            sleep $((attempt * 10))
          done

          public_base="${R2_PUBLIC_BASE_URL%/}"
          {
            echo "### Cloudflare R2"
            echo "Uploaded current release assets to: ${public_base}/${latest_prefix}/"
            echo "Retention: latest release only"
          } >> "$GITHUB_STEP_SUMMARY"
