name: Build Desktop Apps

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-electron:
    name: Build Electron (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          # 如需 macOS 产物，先补齐 server/build.js 中的平台原生依赖拷贝逻辑，
          # 再启用下面两行并确认签名证书配置。
          # - os: macos-latest
          #   platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Cache Electron builder
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron-builder/Cache
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build Electron (${{ matrix.platform }})
        run: node scripts/build-dist.js ${{ matrix.platform }}
        env:
          RELEASE_KEEP_COUNT: 3

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: release/**/electron/**/*
          if-no-files-found: error

  build-tauri:
    name: Build Tauri (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust / Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri
          cache-targets: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build Tauri (Windows)
        run: pnpm package:tauri:win
        env:
          CARGO_BUILD_JOBS: 1
          CARGO_INCREMENTAL: '0'
          RELEASE_KEEP_COUNT: 3

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: release/**/tauri/**/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-electron, build-tauri]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Flatten release assets
        run: |
          mkdir -p dist
          for dir in release-assets/*/; do
            prefix=$(basename "$dir")
            find "$dir" -type f | while read -r file; do
              relative_path="${file#"$dir"}"
              safe_name=$(printf '%s' "$relative_path" | tr '/\' '__')
              cp "$file" "dist/${prefix}_${safe_name}"
            done
          done
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
