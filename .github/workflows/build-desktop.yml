name: Build Desktop Apps

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  pi-skill-validation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact validation source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate latest Pi Skill pilot and persist exact result
        shell: bash
        run: |
          set +e
          pnpm install --frozen-lockfile > /tmp/install.txt 2>&1
          install_status=$?

          typecheck_status=99
          tests_status=99
          if [ "$install_status" -eq 0 ]; then
            pnpm --filter @ui-chat-mira/server typecheck > /tmp/typecheck.txt 2>&1
            typecheck_status=$?
            pnpm --dir server exec vitest run \
              src/agent/nodes/next-action-planner.forked-skill.test.ts \
              src/agent/nodes/prepare-context-with-forked-skill.test.ts \
              src/agent/pi-loop/forked-skill-finalization.test.ts \
              > /tmp/tests.txt 2>&1
            tests_status=$?
          else
            echo "typecheck skipped because frozen install failed" > /tmp/typecheck.txt
            echo "focused tests skipped because frozen install failed" > /tmp/tests.txt
          fi

          {
            echo "Pi Skill Agent validation 2"
            echo "source_commit=$GITHUB_SHA"
            echo "install_status=$install_status"
            echo "typecheck_status=$typecheck_status"
            echo "tests_status=$tests_status"
            echo
            echo "===== frozen install tail ====="
            tail -n 120 /tmp/install.txt
            echo
            echo "===== typecheck tail ====="
            tail -n 260 /tmp/typecheck.txt
            echo
            echo "===== focused tests tail ====="
            tail -n 320 /tmp/tests.txt
          } > /tmp/pi-skill-agent-validation-2.txt

          git fetch origin dev
          git checkout -B dev origin/dev
          cp /tmp/pi-skill-agent-validation-2.txt docs/skill/pi-skill-agent-validation-2.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/skill/pi-skill-agent-validation-2.txt
          git commit -m "chore(ci): record latest Pi Skill validation result"
          git push origin HEAD:dev

          if [ "$install_status" -ne 0 ] || [ "$typecheck_status" -ne 0 ] || [ "$tests_status" -ne 0 ]; then
            exit 1
          fi
