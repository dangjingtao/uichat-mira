name: Build Desktop Apps

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  pi-skill-validation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Run Pi Skill validation and publish exact logs
        shell: bash
        run: |
          set +e
          pnpm install --no-frozen-lockfile > /tmp/pi-skill-install.log 2>&1
          install_status=$?

          typecheck_status=99
          tests_status=99
          if [ "$install_status" -eq 0 ]; then
            pnpm --filter @ui-chat-mira/server typecheck > /tmp/pi-skill-typecheck.log 2>&1
            typecheck_status=$?
            pnpm --dir server exec vitest run \
              src/agent/nodes/next-action-planner.forked-skill.test.ts \
              src/agent/nodes/prepare-context-with-forked-skill.test.ts \
              src/agent/pi-loop/forked-skill-finalization.test.ts \
              > /tmp/pi-skill-tests.log 2>&1
            tests_status=$?
          else
            echo "typecheck skipped because install failed" > /tmp/pi-skill-typecheck.log
            echo "focused tests skipped because install failed" > /tmp/pi-skill-tests.log
          fi

          mkdir -p docs/skill
          {
            echo "Pi Skill Agent validation"
            echo "commit=$GITHUB_SHA"
            echo "install_status=$install_status"
            echo "typecheck_status=$typecheck_status"
            echo "tests_status=$tests_status"
            echo
            echo "===== pnpm install (tail 240) ====="
            tail -n 240 /tmp/pi-skill-install.log
            echo
            echo "===== server typecheck (tail 320) ====="
            tail -n 320 /tmp/pi-skill-typecheck.log
            echo
            echo "===== focused tests (tail 320) ====="
            tail -n 320 /tmp/pi-skill-tests.log
          } > docs/skill/pi-skill-agent-validation.log

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml docs/skill/pi-skill-agent-validation.log
          if ! git diff --cached --quiet; then
            git commit -m "chore(ci): capture Pi Skill validation result"
            git push origin HEAD:dev
          fi

          if [ "$install_status" -ne 0 ] || [ "$typecheck_status" -ne 0 ] || [ "$tests_status" -ne 0 ]; then
            exit 1
          fi
