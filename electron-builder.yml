appId: com.tomz.uichat
productName: UIChat

win:
  signAndEditExecutable: false
  target: nsis
  icon: icons/icon.ico

directories:
  output: ../release
  buildResources: icons

files:
  - backend/**/*
  - desktop/dist/**/*
  - main.cjs
  - preload.cjs
  - runtime.config.cjs
  - package.json

extraResources:
  - from: ./runtime.config.cjs
    to: runtime.config.cjs
  - from: ./node-runtime
    to: node-runtime
  - from: ./backend
    to: server

mac:
  target: dmg
  icon: icons/icon.icns

linux:
  target: AppImage
  icon: icons/icon_512.png
