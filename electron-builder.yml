appId: com.tomz.uichat
productName: UIChat Mira

win:
  signAndEditExecutable: false
  target: nsis
  icon: icons/icon.ico

directories:
  output: ../release
  buildResources: icons

files:
  - backend/**/*
  - desktop/dist/**/*
  - main.cjs
  - preload.cjs
  - runtime.config.cjs
  - package.json

extraResources:
  - from: ./runtime.config.cjs
    to: runtime.config.cjs
  - from: ./node-runtime
    to: node-runtime
  - from: ./terminal-runtime
    to: terminal-runtime
  - from: ./micro-apps/tts/piper
    to: micro-apps/tts/piper
    filter:
      - "**/*"
  - from: ./model-packs
    to: model-packs
    filter:
      - "**/*"
  - from: ./model-runtime
    to: model-runtime
    filter:
      - "**/*"
  - from: ./backend
    to: server
  - from: ./browser-extension
    to: browser-extension

mac:
  target: dmg
  icon: icons/icon.icns

linux:
  target: AppImage
  icon: icons/icon_512.png
